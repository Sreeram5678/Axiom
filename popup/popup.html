<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom — Personal Prompt Optimizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header with Branding and Nav Tabs -->
    <header>
      <div class="logo-section">
        <span class="logo-dot"></span>
        <div class="logo-text">axiom</div>
      </div>
      
      <!-- Premium Segmented Tab Control -->
      <div class="tabs-nav segmented-control">
        <button id="tab-optimize-btn" class="tab-btn segment-btn active" data-target="optimize-panel">Optimize</button>
        <button id="tab-history-btn" class="tab-btn segment-btn" data-target="history-panel">History</button>
        <button id="tab-settings-btn" class="tab-btn segment-btn" data-target="settings-panel">Settings</button>
      </div>
    </header>

    <!-- Main Section Panels -->
    <main>
      <!-- API Key Missing Alert Banner -->
      <div id="api-alert-banner" class="banner-alert" style="display: none;">
        <div class="banner-alert-content">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span>Gemini API Key Required</span>
        </div>
        <span class="banner-alert-action">Configure</span>
      </div>

      <!-- Tab Panel 1: Optimize -->
      <div id="optimize-panel" class="tab-panel active">
        <!-- Raw Prompt Input Console Card -->
        <div class="editor-workspace-card">
          <textarea id="raw-prompt-input" class="input-prompt" placeholder="Paste or type a raw prompt here..."></textarea>
          <div class="editor-footer">
            <div class="length-selector" id="length-selector">
              <button class="length-btn" data-length="short" type="button">Short</button>
              <button class="length-btn active" data-length="medium" type="button">Medium</button>
              <button class="length-btn" data-length="detailed" type="button">Detailed</button>
            </div>
            <span id="char-count" class="label-hint">0 chars</span>
            <span id="token-cost-guardrail" class="label-hint-muted" style="margin-left: 12px; font-weight: 500;">Est. Cost: —</span>
          </div>
        </div>

        <!-- Premium Modes Grid Selector -->
        <div class="modes-selector-section">
          <label class="section-label-small">Optimize Mode</label>
          <div id="modes-grid-container" class="modes-grid">
            <!-- Loaded dynamically -->
          </div>
        </div>

        <!-- CTA Action Button -->
        <div class="cta-row">
          <button id="optimize-cta-btn" class="btn-primary full-width">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            <span>Optimize Prompt</span>
          </button>
          <div class="shortcut-tip">
            Press <kbd>⌥⇧O</kbd> or <kbd>Alt+Shift+O</kbd> in AI inputs to optimize instantly
          </div>
        </div>

        <!-- Dynamic Output Workspace Area -->
        <div id="output-section" class="output-card" style="display: none;">
          <div class="output-header">
            <span class="output-title">Optimized Prompt</span>
            <button id="copy-btn" class="action-icon-btn" title="Copy to clipboard">
              <!-- Copy SVG Icon -->
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="copy-svg"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <!-- Checkmark SVG Icon -->
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="check-svg" style="display: none;"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </button>
          </div>
          <div class="output-text-wrapper">
            <div id="optimized-prompt-output" class="output-text"></div>
          </div>
        </div>
      </div>

      <!-- Tab Panel 2: History -->
      <div id="history-panel" class="tab-panel">
        <div class="panel-header-small">
          <span class="panel-title-small">Optimization History</span>
          <button id="clear-history-btn" class="btn-text-action" type="button">Clear All</button>
        </div>
        <div id="history-list" class="history-list">
          <!-- Loaded dynamically -->
        </div>
      </div>

      <!-- Tab Panel 3: Settings -->
      <div id="settings-panel" class="tab-panel">
        <!-- API Key Configuration Card -->
        <div class="form-group">
          <label class="form-label">API Configuration</label>
          <button id="open-options-btn" class="btn-secondary" style="margin-top: 5px;">Manage API Key</button>
        </div>

        <!-- Model Selection Card -->
        <div class="form-group">
          <label for="model-select" class="form-label">Gemini Model</label>
          <div class="select-wrapper">
            <select id="model-select">
              <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite (Recommended)</option>
              <option value="gemini-3.1-flash">Gemini 3.1 Flash (High-Speed)</option>
              <option value="gemini-3.1-pro">Gemini 3.1 Pro (Complex Tasks)</option>
            </select>
          </div>
        </div>

        <!-- Default Prompt Length Card -->
        <div class="form-group">
          <label for="default-length-select" class="form-label">Default Prompt Length</label>
          <div class="select-wrapper">
            <select id="default-length-select">
              <option value="short">Short</option>
              <option value="medium">Medium</option>
              <option value="detailed">Detailed</option>
            </select>
          </div>
        </div>

        <!-- AI Routing Mode Selector -->
        <div class="form-group">
          <label for="ai-routing-select" class="form-label">AI Routing Mode</label>
          <div class="select-wrapper">
            <select id="ai-routing-select">
              <option value="hybrid">Hybrid (Auto)</option>
              <option value="cloud-only">Cloud Only</option>
              <option value="local-only">On-Device Only (Gemini Nano)</option>
            </select>
          </div>
          <span id="ram-tip" class="label-hint" style="display: none; margin-top: 4px; color: var(--text-secondary);"></span>
        </div>

        <!-- Currency Display Selector -->
        <div class="form-group" style="margin-top: 4px;">
          <label for="currency-select" class="form-label">Cost Display Currency</label>
          <div class="select-wrapper">
            <select id="currency-select">
              <option value="USD">USD ($) — US Dollar</option>
              <option value="INR">INR (₹) — Indian Rupee</option>
            </select>
          </div>
        </div>

        <!-- Floating Widget Visibility Toggle -->
        <div class="form-group" style="margin-top: 4px; border-top: 1px solid var(--border-subtle); padding-top: 12px;">
          <div class="switch-wrapper">
            <label class="form-label" style="margin-bottom: 0;">Show In-Page Floating Button</label>
            <label class="switch">
              <input type="checkbox" id="widget-toggle-checkbox" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Zero-Knowledge Sync Card -->
        <div class="form-group" style="margin-top: 5px; border-top: 1px solid var(--border-subtle); padding-top: 12px;">
          <label class="form-label">Zero-Knowledge Sync</label>
          <div id="sync-status-badge" class="sync-badge" style="display: none; margin-bottom: 8px;"></div>
          <div id="sync-passphrase-wrapper" class="form-sub-group" style="margin-bottom: 8px;">
            <input type="password" id="sync-passphrase-input" class="form-input" placeholder="Enter Sync Passphrase" style="width: 100%;">
          </div>
          <div style="display: flex; gap: 8px;">
            <button id="enable-sync-btn" class="btn-secondary" style="font-size: 11px; padding: 6px 12px; flex: 1;" type="button">Enable Sync</button>
            <button id="disable-sync-btn" class="btn-secondary" style="font-size: 11px; padding: 6px 12px; flex: 1; display: none; border-color: rgba(239, 68, 68, 0.2); color: #f87171;" type="button">Disable Sync</button>
          </div>
        </div>


        <!-- System Modes Customization (Visual Mode Manager) -->
        <div class="form-group mode-manager-group">
          <div class="mode-manager-header">
            <label class="form-label">Visual Modes Manager</label>
            <button id="add-mode-toggle-btn" class="btn-text-action" type="button">+ Add Mode</button>
          </div>
          
          <!-- Mode Creator Form -->
          <div id="mode-creator-form" class="mode-creator-form-panel" style="display: none;">
            <div class="form-sub-group">
              <input type="text" id="new-mode-name" class="form-input" placeholder="Mode Name (e.g. Creative Writer)">
            </div>
            <div class="form-sub-group">
              <input type="text" id="new-mode-desc" class="form-input" placeholder="Short description (e.g. Craft engaging copy)">
            </div>
            <div class="form-sub-group">
              <textarea id="new-mode-instruction" class="form-textarea" placeholder="System instructions for Gemini..."></textarea>
            </div>
            <div class="form-sub-group inline-row">
              <div class="icon-selector-wrapper">
                <label class="field-label-small">Accent Color</label>
                <select id="new-mode-icon" class="icon-select">
                  <option value="blue">Analytical Blue</option>
                  <option value="green">Technical Green</option>
                  <option value="purple">First-Principles Purple</option>
                  <option value="yellow">Exec-Summary Amber</option>
                  <option value="red">Hot Coral</option>
                  <option value="pink">Magenta Rose</option>
                  <option value="grey">Cool Slate</option>
                </select>
              </div>
              <button id="save-new-mode-btn" class="btn-primary-small" type="button">Add Mode</button>
            </div>
            <div id="mode-creator-error" class="form-error-msg"></div>
          </div>

          <!-- Visual Modes List -->
          <div id="visual-modes-list" class="visual-modes-list">
            <!-- Rendered dynamically -->
          </div>
        </div>

        <!-- Advanced JSON Configuration -->
        <details class="advanced-json-details">
          <summary class="advanced-json-summary">Advanced JSON View</summary>
          <div class="form-group json-editor-wrapper">
            <textarea id="json-modes-editor" class="json-textarea"></textarea>
            <div id="json-error-status" class="json-status"></div>
          </div>
        </details>

        <!-- Action Buttons for Settings -->
        <div class="settings-actions">
          <button id="reset-defaults-btn" class="btn-secondary">Reset Defaults</button>
          <button id="save-settings-btn" class="btn-primary-small">Save Settings</button>
        </div>
      </div>
    </main>

    <!-- Floating Toast Notification -->
    <div id="copy-toast" class="toast-notification">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      <span>Copied to Clipboard</span>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
