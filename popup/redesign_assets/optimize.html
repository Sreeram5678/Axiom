<style>
        body {
            background-color: #fcf9f5;
            color: #1b1c1a;
            width: 380px;
            height: 600px;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e5e2df;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e5e2df;
            border-radius: 2px;
        }
        .mode-card-active {
            border-color: #455547 !important;
            background-color: #f6f3f0;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-lg">
<!-- Extension Header (Compact) -->
<header class="w-full flex flex-col shrink-0 bg-surface-container-low">
  <!-- Title Bar -->
  <div class="flex items-center justify-between px-container-padding h-8">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-primary" style="font-size: 16px;" data-icon="temp_preferences_custom">temp_preferences_custom</span>
      <h1 class="font-label-md text-[11px] text-on-surface-variant uppercase tracking-tight">Axiom</h1>
    </div>
    <div class="flex items-center gap-1">
      <button class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant" style="font-size: 14px;" data-icon="history">history</span>
      </button>
      <button class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
        <span class="material-symbols-outlined text-on-surface-variant" style="font-size: 14px;" data-icon="settings">settings</span>
      </button>
    </div>
  </div>
  <!-- Tab Bar -->
  <div class="flex items-end px-2 h-9 gap-0.5">
    <!-- Active Tab -->
    <div class="relative flex items-center h-8 px-4 text-primary font-headline-md text-[12px] cursor-default hover:bg-surface-container-high transition-colors active:scale-[0.95] transition-all duration-300">
      Optimize
      <div class="absolute bottom-0 left-4 right-4 h-0.5 bg-primary rounded-full"></div>
    </div>
    <!-- Separator -->
    
    <!-- Inactive Tab -->
    <div class="flex items-center h-8 px-4 text-outline font-body-sm text-[12px] cursor-pointer hover:text-on-surface-variant transition-colors hover:bg-surface-container-high active:scale-[0.95] transition-all duration-300">
      History
    </div>
    <!-- Separator -->
    
    <!-- Inactive Tab -->
    <div class="flex items-center h-8 px-4 text-outline font-body-sm text-[12px] cursor-pointer hover:text-on-surface-variant transition-colors hover:bg-surface-container-high active:scale-[0.95] transition-all duration-300">
      Library
    </div>
  </div>
</header>
<!-- Scrollable Content Area -->
<main class="flex-1 overflow-y-auto custom-scrollbar p-4">
<!-- Section: Title -->
<section class="mb-4">
<h2 class="font-headline-md text-headline-md text-on-surface">Optimize Prompt</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Refine intent into a professional directive.</p>
</section>
<!-- Input Area -->
<section class="mb-5">
<div class="relative">
<textarea class="w-full h-24 bg-surface-container-low border border-outline-variant focus:ring-1 focus:ring-primary focus:border-primary p-3 font-body-lg text-body-lg placeholder:text-outline transition-all duration-300 resize-none rounded-lg" placeholder="I want to make a 10 second video showcasing the new product lineup..."></textarea>
<div class="absolute bottom-2 right-2 flex items-center gap-2 text-outline">
<span class="font-label-sm text-label-sm">0/500</span>
</div>
</div>
</section>
<!-- Mode Selection Header -->
<div class="flex items-center justify-between mb-2">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Optimization Mode</span>
<span class="material-symbols-outlined text-outline text-sm" data-icon="info" style="font-size: 14px;">info</span>
</div>
<!-- Mode Grid (Compact) -->
<section class="grid grid-cols-2 gap-2 mb-5">
<!-- Analyst -->
<button class="mode-card flex flex-col items-start p-2.5 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-all text-left" onclick="selectMode(this)">
<span class="material-symbols-outlined text-primary mb-1" data-icon="analytics">analytics</span>
<span class="font-label-md text-label-md text-on-surface">Analyst</span>
<span class="font-body-sm text-[10px] text-on-surface-variant leading-tight">Data-driven &amp; structural.</span>
</button>
<!-- Engineer -->
<button class="mode-card flex flex-col items-start p-2.5 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-all text-left" onclick="selectMode(this)">
<span class="material-symbols-outlined text-primary mb-1" data-icon="precision_manufacturing">precision_manufacturing</span>
<span class="font-label-md text-label-md text-on-surface">Engineer</span>
<span class="font-body-sm text-[10px] text-on-surface-variant leading-tight">Technical &amp; logic.</span>
</button>
<!-- First-Principles -->
<button class="mode-card flex flex-col items-start p-2.5 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-all text-left mode-card-active" onclick="selectMode(this)">
<span class="material-symbols-outlined text-primary mb-1" data-icon="architecture" style="font-variation-settings: 'FILL' 1;">architecture</span>
<span class="font-label-md text-label-md text-on-surface">First-Principles</span>
<span class="font-body-sm text-[10px] text-on-surface-variant leading-tight">Foundational truths.</span>
</button>
<!-- Exec-Summary -->
<button class="mode-card flex flex-col items-start p-2.5 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-all text-left" onclick="selectMode(this)">
<span class="material-symbols-outlined text-primary mb-1" data-icon="summarize">summarize</span>
<span class="font-label-md text-label-md text-on-surface">Exec-Summary</span>
<span class="font-body-sm text-[10px] text-on-surface-variant leading-tight">Leadership insights.</span>
</button>
<!-- Photo Prompt -->
<button class="mode-card flex flex-col items-start p-2.5 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-all text-left" onclick="selectMode(this)">
<span class="material-symbols-outlined text-primary mb-1" data-icon="photo_camera">photo_camera</span>
<span class="font-label-md text-label-md text-on-surface">Photo Prompt</span>
<span class="font-body-sm text-[10px] text-on-surface-variant leading-tight">Visual &amp; lighting.</span>
</button>
<!-- Video Prompt -->
<button class="mode-card flex flex-col items-start p-2.5 border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-all text-left" onclick="selectMode(this)">
<span class="material-symbols-outlined text-primary mb-1" data-icon="movie">movie</span>
<span class="font-label-md text-label-md text-on-surface">Video Prompt</span>
<span class="font-body-sm text-[10px] text-on-surface-variant leading-tight">Motion &amp; pacing.</span>
</button>
</section>
<!-- Aesthetic Card (Visual Anchor) - Made more compact for Extension -->
<div class="relative w-full rounded-xl overflow-hidden mb-5">
<div class="absolute inset-0 bg-primary-container opacity-20"></div>
<div class="absolute inset-0 p-3 flex items-center justify-between">
<div>
<h3 class="font-headline-md text-sm text-on-primary-container">Smart Suggestions</h3>
<p class="font-body-sm text-[10px] text-on-primary-container opacity-80">AI auto-contextualization</p>
</div>
<div class="w-8 h-4 bg-primary rounded-full relative cursor-pointer">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
<div class="h-16 w-full -z-10 bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBzYjYZXJu-TpqoaU25HZE_-2c_-CQGdTwd2vhrZlEeKWOVVED_WnETkmEqFsLd3Jbsog3Kl_lQdS996FCq8FapzuFArDicbJGVrUFMHzaE3yZmDRLbFoQJdYi9nv6afPKPVxRxc8xp45ogMt42mNwX2gBPt3uiI7w6jfGJZgP9nKEvuBdp51VehhIdxA0sIR0CRrKf_dM2jUiIC20N0tYHalekw4-w9CUrfU3M6QlmykzR5WSSOI6B')"></div>
</div>
</main>
<!-- Action Footer (Sticky) -->
<footer class="p-4 bg-surface border-t border-outline-variant shrink-0">
<button class="w-full h-11 bg-primary text-on-primary rounded-full font-headline-md text-sm shadow hover:brightness-110 transition-all flex items-center justify-center gap-2 active:scale-[0.95] duration-300">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
            Optimize Prompt
        </button>
</footer>
<script>
        function selectMode(element) {
            document.querySelectorAll('.mode-card').forEach(card => {
                card.classList.remove('mode-card-active');
                const icon = card.querySelector('.material-symbols-outlined');
                if (icon) icon.style.fontVariationSettings = "'FILL' 0";
            });
            element.classList.add('mode-card-active');
            const icon = element.querySelector('.material-symbols-outlined');
            if (icon) icon.style.fontVariationSettings = "'FILL' 1";
        }

        const textarea = document.querySelector('textarea');
        const counter = document.querySelector('.font-label-sm');
        textarea.addEventListener('input', (e) => {
            const length = e.target.value.length;
            counter.textContent = `${length}/500`;
            if (length > 450) counter.classList.add('text-secondary');
            else counter.classList.remove('text-secondary');
        });
    </script>






</body></html>
