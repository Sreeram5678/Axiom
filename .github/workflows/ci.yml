name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-extension:
    name: Test Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Extension Tests
        run: npm run test

  build-test-axiomos:
    name: Build & Test AxiomOS
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Cache Swift Package Manager Build
        uses: actions/cache@0c011e40025d8e7906d20399d25166299b860662 # v4.0.0
        with:
          path: AxiomOS/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('AxiomOS/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Swift Package (Release)
        run: swift build -c release --package-path AxiomOS

      - name: Run Swift Package Tests
        run: swift test --package-path AxiomOS
