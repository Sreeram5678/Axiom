name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-extension:
    name: Test Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Extension Tests
        run: npm run test

  build-test-axiomos:
    name: Build & Test AxiomOS
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Cache Swift Package Manager Build
        uses: actions/cache@v4
        with:
          path: AxiomOS/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('AxiomOS/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build Swift Package (Release)
        run: swift build -c release --package-path AxiomOS

      - name: Run Swift Package Tests
        run: swift test --package-path AxiomOS
